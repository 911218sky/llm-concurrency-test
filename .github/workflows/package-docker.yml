name: Package Docker Image

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          outputs: type=docker,dest=/tmp/llm-concurrency-test.tar
          tags: llm-concurrency-test:${{ github.sha }}
      - run: gzip -9 /tmp/llm-concurrency-test.tar
      - uses: actions/upload-artifact@v4
        with:
          name: llm-concurrency-test-image
          path: /tmp/llm-concurrency-test.tar.gz
          if-no-files-found: error
          retention-days: 14
